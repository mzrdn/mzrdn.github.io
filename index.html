<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя страница</title>

<style>
/* Общие стили */
body {
  margin: 0;
  padding: 0;
  font-family: 'Arial', sans-serif;
  background: #00aaff; /* Неоново-синий фон */
  color: #fff;
  text-align: center;
}

/* Контейнер для содержимого */
.container {
  padding: 60px 20px;
  max-width: 900px;
  margin: 0 auto;
  background-color: rgba(0, 0, 0, 0.6); /* Полупрозрачный фон */
  border-radius: 15px;
}

/* Заголовок страницы */
h1 {
  font-size: 36px;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: bold;
}

/* Кнопки с огненным эффектом */
.button {
  display: inline-block;
  width: 200px;
  padding: 16px;
  margin: 15px;
  background: linear-gradient(45deg, #ff7f00, #ff4500, #ff0000); /* Градиент от оранжевого до красного */
  border-radius: 50px;
  text-decoration: none;
  color: white;
  font-size: 20px;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(255, 69, 0, 0.6), 0 0 30px rgba(255, 69, 0, 0.8); /* Огненная тень */
  transition: transform 0.3s ease, background-color 0.3s ease;
}

.button:hover {
  background: linear-gradient(45deg, #ff4500, #ff0000, #ff7f00); /* Изменение градиента при наведении */
  transform: scale(1.1); /* Увеличение кнопки при наведении */
}

.button:active {
  transform: scale(1); /* Нормальный размер при нажатии */
}

/* Подпись футера */
.footer {
  margin-top: 30px;
  font-size: 16px;
  opacity: 0.8;
  letter-spacing: 1px;
}

/* Стиль для стрелки вниз */
.arrow {
  font-size: 40px;
  margin-top: 20px;
  cursor: pointer;
  animation: bounce 1.5s infinite; /* Анимация для стрелки */
}

@keyframes bounce {
  0% { transform: translateY(0); }
  50% { transform: translateY(15px); }
  100% { transform: translateY(0); }
}
</style>

</head>
<body>

<div class="container">
  <h1>Контакты</h1> <!-- Заголовок на русском -->
  <h1>Contacts</h1> <!-- Заголовок на английском -->
  
  <!-- Кнопки с огненным эффектом и ссылками -->
  <a class="button" href="https://tone.affomelody.com/click?pid=62259&offer_id=25" target="_blank">
    ЗНАКОМСТВА 18+
  </a>

  <a class="button" href="https://tone.affomelody.com/click?pid=62259&offer_id=25" target="_blank">
    DATING
  </a>

  <!-- Стрелка вниз -->
  <div class="arrow">↓</div>

  <!-- Закрытие тега footer -->
  <div class="footer">Powered by HeyLink</div>
</div>

</body>
</html>
