<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Моя страница</title>

<style>
/* Общие стили */
body {
  margin: 0;
  padding: 0;
  font-family: 'Arial', sans-serif;
  background: #00aaff; /* Неоново-синий фон */
  color: #fff;
  text-align: center;
  animation: pulse 2s infinite alternate; /* Пульсация фона */
}

/* Пульсация фона */
@keyframes pulse {
  0% {
    background: #00aaff;
  }
  100% {
    background: #0088cc;
  }
}

/* Контейнер для содержимого */
.container {
  padding: 60px 20px;
  max-width: 900px;
  margin: 0 auto;
  background-color: rgba(0, 0, 0, 0.6); /* Полупрозрачный фон */
  border-radius: 15px;
}

/* Заголовок страницы */
h1 {
  font-size: 36px;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 2px;
  font-weight: bold;
}

/* Кнопки с огненным эффектом */
.button {
  display: inline-block;
  width: 200px;
  padding: 16px;
  margin: 15px;
  background: linear-gradient(45deg, #ff7f00, #ff4500, #ff0000); /* Градиент от оранжевого до красного */
  border-radius: 50px;
  text-decoration: none;
  color: white;
  font-size: 20px;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(255, 69, 0, 0.6), 0 0 30px rgba(255, 69, 0, 0.8); /* Огненная тень */
  transition: transform 0.3s ease, background-color 0.3s ease;
  animation: fireButton 1s infinite alternate; /* Анимация для кнопок */
}

.button:hover {
  background: linear-gradient(45deg, #ff4500, #ff0000, #ff7f00); /* Изменение градиента при наведении */
  transform: scale(1.1); /* Увеличение кнопки при наведении */
}

.button:active {
  transform: scale(1); /* Нормальный размер при нажатии */
}
